[build]
  command = "npm run build && ls dist"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.form_detection]
  enabled = true

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200